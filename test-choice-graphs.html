<!DOCTYPE html>
<html>
<head>
<style>
body { background: white; display: flex; justify-content: center; padding: 20px; }
.container { max-width: 800px; }
</style>
</head>
<body>
<div class="container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" width="780" height="320" font-family="'Malgun Gothic', sans-serif">
  <!-- ① 그래프: A가 B보다 기울기 큼 (직선, 원점 통과) -->
  <g transform="translate(0, 0)">
    <text x="0" y="16" font-size="16" font-weight="bold">①</text>
    <text x="22" y="16" font-size="13">전류↑</text>
    <!-- 축 -->
    <line x1="40" y1="20" x2="40" y2="130" stroke="black" stroke-width="1.5"/>
    <line x1="40" y1="130" x2="190" y2="130" stroke="black" stroke-width="1.5"/>
    <!-- 화살표 -->
    <polygon points="40,18 37,26 43,26" fill="black"/>
    <polygon points="192,130 184,127 184,133" fill="black"/>
    <text x="105" y="148" font-size="11" text-anchor="middle">전압</text>
    <text x="30" y="135" font-size="10">0</text>
    <!-- A: 기울기 큼 (저항 작음) -->
    <polyline points="40,130 70,105 100,80 130,55 160,35" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="70" cy="105" r="3" fill="black"/>
    <circle cx="100" cy="80" r="3" fill="black"/>
    <circle cx="130" cy="55" r="3" fill="black"/>
    <circle cx="160" cy="35" r="3" fill="black"/>
    <text x="165" y="33" font-size="12" font-weight="bold">A</text>
    <!-- B: 기울기 작음 (저항 큼) -->
    <polyline points="40,130 70,118 100,105 130,92 160,80" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="70" cy="118" r="3" fill="black"/>
    <circle cx="100" cy="105" r="3" fill="black"/>
    <circle cx="130" cy="92" r="3" fill="black"/>
    <circle cx="160" cy="80" r="3" fill="black"/>
    <text x="165" y="78" font-size="12" font-weight="bold">B</text>
  </g>

  <!-- ② 그래프: B가 A보다 기울기 큼 -->
  <g transform="translate(200, 0)">
    <text x="0" y="16" font-size="16" font-weight="bold">②</text>
    <text x="22" y="16" font-size="13">전류↑</text>
    <line x1="40" y1="20" x2="40" y2="130" stroke="black" stroke-width="1.5"/>
    <line x1="40" y1="130" x2="190" y2="130" stroke="black" stroke-width="1.5"/>
    <polygon points="40,18 37,26 43,26" fill="black"/>
    <polygon points="192,130 184,127 184,133" fill="black"/>
    <text x="105" y="148" font-size="11" text-anchor="middle">전압</text>
    <text x="30" y="135" font-size="10">0</text>
    <!-- B: 기울기 큼 -->
    <polyline points="40,130 70,105 100,80 130,55 160,35" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="70" cy="105" r="3" fill="black"/>
    <circle cx="100" cy="80" r="3" fill="black"/>
    <circle cx="130" cy="55" r="3" fill="black"/>
    <circle cx="160" cy="35" r="3" fill="black"/>
    <text x="165" y="33" font-size="12" font-weight="bold">B</text>
    <!-- A: 기울기 작음 -->
    <polyline points="40,130 70,118 100,105 130,92 160,80" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="70" cy="118" r="3" fill="black"/>
    <circle cx="100" cy="105" r="3" fill="black"/>
    <circle cx="130" cy="92" r="3" fill="black"/>
    <circle cx="160" cy="80" r="3" fill="black"/>
    <text x="165" y="78" font-size="12" font-weight="bold">A</text>
  </g>

  <!-- ③ 그래프: 반비례 곡선 (감소), A>B -->
  <g transform="translate(400, 0)">
    <text x="0" y="16" font-size="16" font-weight="bold">③</text>
    <text x="22" y="16" font-size="13">전류↑</text>
    <line x1="40" y1="20" x2="40" y2="130" stroke="black" stroke-width="1.5"/>
    <line x1="40" y1="130" x2="190" y2="130" stroke="black" stroke-width="1.5"/>
    <polygon points="40,18 37,26 43,26" fill="black"/>
    <polygon points="192,130 184,127 184,133" fill="black"/>
    <text x="105" y="148" font-size="11" text-anchor="middle">전압</text>
    <text x="30" y="135" font-size="10">0</text>
    <!-- A: 감소 곡선 (위) -->
    <path d="M50,30 Q80,45 110,75 Q140,100 170,108" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="60" cy="35" r="3" fill="black"/>
    <circle cx="90" cy="58" r="3" fill="black"/>
    <circle cx="120" cy="82" r="3" fill="black"/>
    <circle cx="150" cy="100" r="3" fill="black"/>
    <text x="175" y="106" font-size="12" font-weight="bold">A</text>
    <!-- B: 감소 곡선 (아래) -->
    <path d="M50,45 Q80,60 110,88 Q140,110 170,118" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="60" cy="50" r="3" fill="black"/>
    <circle cx="90" cy="72" r="3" fill="black"/>
    <circle cx="120" cy="95" r="3" fill="black"/>
    <circle cx="150" cy="112" r="3" fill="black"/>
    <text x="175" y="116" font-size="12" font-weight="bold">B</text>
  </g>

  <!-- ④ 그래프: 감소 곡선, B>A -->
  <g transform="translate(60, 165)">
    <text x="0" y="16" font-size="16" font-weight="bold">④</text>
    <text x="22" y="16" font-size="13">전류↑</text>
    <line x1="40" y1="20" x2="40" y2="130" stroke="black" stroke-width="1.5"/>
    <line x1="40" y1="130" x2="190" y2="130" stroke="black" stroke-width="1.5"/>
    <polygon points="40,18 37,26 43,26" fill="black"/>
    <polygon points="192,130 184,127 184,133" fill="black"/>
    <text x="105" y="148" font-size="11" text-anchor="middle">전압</text>
    <text x="30" y="135" font-size="10">0</text>
    <!-- B: 감소 곡선 (위) -->
    <path d="M50,30 Q80,45 110,75 Q140,100 170,108" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="60" cy="35" r="3" fill="black"/>
    <circle cx="90" cy="58" r="3" fill="black"/>
    <circle cx="120" cy="82" r="3" fill="black"/>
    <circle cx="150" cy="100" r="3" fill="black"/>
    <text x="175" y="106" font-size="12" font-weight="bold">B</text>
    <!-- A: 감소 곡선 (아래) -->
    <path d="M50,45 Q80,60 110,88 Q140,110 170,118" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="60" cy="50" r="3" fill="black"/>
    <circle cx="90" cy="72" r="3" fill="black"/>
    <circle cx="120" cy="95" r="3" fill="black"/>
    <circle cx="150" cy="112" r="3" fill="black"/>
    <text x="175" y="116" font-size="12" font-weight="bold">A</text>
  </g>

  <!-- ⑤ 그래프: 수평 직선 (전류 일정) -->
  <g transform="translate(340, 165)">
    <text x="0" y="16" font-size="16" font-weight="bold">⑤</text>
    <text x="22" y="16" font-size="13">전류↑</text>
    <line x1="40" y1="20" x2="40" y2="130" stroke="black" stroke-width="1.5"/>
    <line x1="40" y1="130" x2="190" y2="130" stroke="black" stroke-width="1.5"/>
    <polygon points="40,18 37,26 43,26" fill="black"/>
    <polygon points="192,130 184,127 184,133" fill="black"/>
    <text x="105" y="148" font-size="11" text-anchor="middle">전압</text>
    <text x="30" y="135" font-size="10">0</text>
    <!-- A: 수평선 (위) -->
    <polyline points="50,65 80,65 110,65 140,65 170,65" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="50" cy="65" r="3" fill="black"/>
    <circle cx="80" cy="65" r="3" fill="black"/>
    <circle cx="110" cy="65" r="3" fill="black"/>
    <circle cx="140" cy="65" r="3" fill="black"/>
    <circle cx="170" cy="65" r="3" fill="black"/>
    <text x="175" y="63" font-size="12" font-weight="bold">A</text>
    <!-- B: 수평선 (아래) -->
    <polyline points="50,90 80,90 110,90 140,90 170,90" fill="none" stroke="black" stroke-width="1.8"/>
    <circle cx="50" cy="90" r="3" fill="black"/>
    <circle cx="80" cy="90" r="3" fill="black"/>
    <circle cx="110" cy="90" r="3" fill="black"/>
    <circle cx="140" cy="90" r="3" fill="black"/>
    <circle cx="170" cy="90" r="3" fill="black"/>
    <text x="175" y="88" font-size="12" font-weight="bold">B</text>
  </g>
</svg>
</div>
</body>
</html>
